services:
  backend:
    build:
      context: ..
      dockerfile: ae_recon_webapp/Dockerfile.backend
    environment:
      AE_RECON_CKPT: /app/ae_radiograph_filter/models/ae_identity_bestE21.ckpt
      AE_RECON_SAMPLE_IMAGES_DIR: /app/ae_recon_webapp/sample_images
      AE_RECON_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: ae_recon_webapp/Dockerfile.frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
